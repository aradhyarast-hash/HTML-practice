<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Complex Form</h2>
    <fieldset>
        <legend><h4>Personal Infromation</h4></legend>
        <label for="name">Name:</label>
        <input type="text" name="name" id="name">
        <label for="Email">Email: </label>
        <input type="text" name="Email" id="Email">
        <label for="tel">Phone:</label>
        <input type="tel" name="Phone" id="Phone">
        <br>
        <br>
        <label for="dob">Date Of Birth:</label>
        <input type="date" name="dateselector" id="dateselector">
        <br>
        <br>
        
        <label for="gender">Select Gender:</label>
        <input type="radio" name="radio" id="radio1">
        <label for="gender">Female</label>
        <input type="radio" name="radio" id="radio2">
        <label for="gender">Male</label>
        <input type="radio" name="radio" id="radio3">
        <label for="gender">Other</label>
        <input type="radio" name="radio" id="radio3">
        <label for="gender">Prefer not to say</label>
        
        <br>
        <br>
        <label for="country">Select your Country:</label>
        <select name="country" id="country">
            <option value="India">India</option>
            <option value="America">America</option>
            <option value="China">China</option>
            <option value="Japan">Japan</option>
            <option value="North Korea">North Korea</option>
            <option value="Nepal">Nepal</option>
            <option value="Greece">Greece</option>
            <option value="Australia">Australia</option>
        </select>
    </fieldset>
    <br>
    <br>
    <fieldset>
        <legend><h4>Address</h4></legend>
        <label for="address">Street</label>
        <input type="text" name="street" id="street" placeholder="enter the street...">
        <label for="address">City</label>
        <input type="text" name="city" id="city" placeholder="Enter the city...">
        <label for="address">State</label>
        <input type="text" name="state" id="state" placeholder="Enter the state...">
        <br>
        <br>

        <label for="address">Pin Code</label>
        <input type="text" name="pin code" id="code" placeholder="Enter the pin code...">
        <br>

    </fieldset>
    <br>
    <br>

    <fieldset>
        <legend><h3>Other Information</h3></legend>
        <label for="comments">Comments:</label>
        <br>

        <textarea name="comments" id="comments" cols="40" rows="20" placeholder="write your other information here..."></textarea>
        <br>
        <br>
       
    </fieldset>

    <label for="terms and condition">I agree to the terms and service</label>
    <input type="checkbox" name="checkbox1" id="checkbox1">
    <br>
    <br>

    <button>Submit</button>
    <button>Clear all</button>
</body>
</html>
