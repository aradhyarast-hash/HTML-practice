<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato - Food delivery at your doorstep</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background-color: #f4fdf4;
    color: #333;
}

/* Header */
header {
    background-color: #2e7d32;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header div:first-child {
    color: white;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 1px;
}

header div:last-child a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-size: 16px;
}

header div:last-child a:hover {
    color: #a5d6a7;
    text-decoration: underline;
}

/* Main */
main {
    text-align: center;
    padding: 80px 20px;
}

main div {
    font-size: 42px;
    font-weight: bold;
    color: #2e7d32;
    margin-bottom: 20px;
}

main p {
    font-size: 18px;
    color: #555;
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.6;
}

/* Footer */
footer {
    background-color: #1b5e20;
    color: white;
    text-align: center;
    padding: 20px;
    position: fixed;
    bottom: 0;
    width: 100%;
    font-size: 14px;
}
    </style>
</head>
<body>
    <header>
        <div>
            Zomato
        </div>
        <div>
            <a href="/home">home</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
        </div>
    </header>
    <main>
        <div>
            Order food anytime, anywhere.
        </div>
        <p>
            Zomato is the best food delivery service in the city. We deliver food from your favorite restaurants directly to your doorstep.
        </p>
    </main>
    <footer>
        © Zomato All rights reserved
    </footer>
</body>
</html>
